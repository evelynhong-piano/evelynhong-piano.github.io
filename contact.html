<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#eee;
  font-family:Arial;
}

/* ===== HEADER（和首页统一） ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(10,10,10,0.6);
  backdrop-filter: blur(10px);
  z-index:1000;
}

.menu-btn{
  position:absolute;
  left:20px;
  font-size:clamp(28px,6vw,42px);
  padding:14px;
  cursor:pointer;
  color:#aaa;
}

/* 你的“艺术home标记” */
.home-mark{
  position:relative;
  width:50px;
  height:20px;
  display:block;
  cursor:pointer;
}

.home-mark span:first-child{
  position:absolute;
  left:0;
  top:5px;
  width:50px;
  height:1px;
  background:#aaa;
  transform:translateX(-6px);
  transition:0.3s;
}

.home-mark span:last-child{
  position:absolute;
  left:0;
  top:12px;
  width:35px;
  height:1px;
  background:#666;
  transition:0.3s;
}

.home-mark:hover span:first-child{
  transform:translateX(0);
  background:#fff;
}

.home-mark:hover span:last-child{
  width:50px;
  background:#aaa;
}

/* MENU */
.menu{
  position:fixed;
  top:0;
  left:-220px;
  width:180px;
  height:100%;
  background:#111;
  padding:80px 20px;
  transition:0.3s;
}

.menu.open{
  left:0;
}

.menu a{
  display:block;
  margin:20px 0;
  color:#ccc;
  text-decoration:none;
}

/* 内容 */
.container{
  max-width:700px;
  margin:160px auto; /* 往下推，避开header */
  text-align:center;
}

a{color:#888;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">≡</div>

  <a href="index.html" class="home-mark">
    <span></span>
    <span></span>
  </a>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <a href="index.html">Home</a>
  <a href="projects.html">Projects</a>
  <a href="services.html">Work/Services</a>
  <a href="contact.html">Contact</a>
</div>

<!-- 内容 -->
<div class="container">

  <h1>CONTACT</h1>

  <p>Email: <a href="mailto:evelyn_hong1219@ymail.ne.jp">evelyn_hong1219@ymail.ne.jp</a></p>

  <p>演奏・伴奏・通訳のご依頼は、メールにてお気軽にお問い合わせください。Available for collaboration / performance / teaching</p>

  <p>
    <a href="https://www.instagram.com/hyf_1219" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" style="width:30px; vertical-align:middle;">
      @hyf_1219
    </a>
  </p>

</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
